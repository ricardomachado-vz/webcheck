<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard | WebCheck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <div class="overlay">
        <header class="topbar">
            <div class="topbar-spacer"></div>

            <div class="logo-area">
                <h2>WebCheck</h2>
            </div>

            <div class="user-area user-profile dropdown">
                <button class="btn user-menu-toggle dropdown-toggle"
                        type="button"
                        id="menuUsuario"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                    <span class="user-menu-label">
                        <span id="usuarioNome">Usuário</span>
                        <small id="usuarioTipo" class="user-role d-none"></small>
                    </span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end"
                    aria-labelledby="menuUsuario">
                    <li id="adminCadastroUsuario" class="d-none">
                        <a href="cadastro-usuario.html" class="dropdown-item">
                            Gerenciar usuários
                        </a>
                    </li>
                    <li id="adminMenuDivider" class="d-none"><hr class="dropdown-divider"></li>
                    <li>
                        <button type="button"
                                class="dropdown-item"
                                onclick="logout()">
                            Sair
                        </button>
                    </li>
                </ul>
            </div>

        </header>
        <main class="dashboard-container">
            <div class="dashboard-box">
                <h1>Checklists</h1>
                <p class="subtitulo">
                    Selecione o equipamento que será feita a preventiva
                </p>

                <div class="row g-4 mt-3">

                    <!-- Primeiro card -->
                    <div class="col-12 col-md-6 col-lg-6">
                        <a href="talha-cabo.html" class="card-link">
                        <div class="checklist-card">
                            <div class="image-placeholder">
                                 <img src="../assets/img/monovia.png" alt="Monovia">
                            </div>
                            <h4>
                                Monovia-Pórtico-Braço giratório
                            </h4>
                        </div>
                        </a>
                    </div>

                    <!-- Segundo card -->
                    <div class="col-12 col-md-6 col-lg-6">
                        <a href="preventiva-ponte-rolante.html" class="card-link">
                        <div class="checklist-card">
                            <div class="image-placeholder">
                                <img src="../assets/img/ponte-rolante.png" alt="ponte-rolante">
                            </div>
                            <h4>
                                Eletromecânica Ponte Rolante
                            </h4>
                        </div>
                        </a>
                    </div>

                    <!-- terceiro card -->
                    <div class="col-12 col-md-6 col-lg-6">
                        <a href="preventiva-talha-cabo.html"class="card-link">
                        <div class="checklist-card">
                            <div class="image-placeholder">
                                <img src="../assets/img/talha-cabo.png" alt="talha-cabo">
                            </div>
                            <h4>
                                Eletromecânica Talha Elétrica Cabo de Aço de Monovia
                            </h4>
                        </div>
                        </a>
                    </div>

                    <!-- Quarto card -->
                    <div class="col-12 col-md-6 col-lg-6">
                        <a href="eletromecanica-talha.html"class="card-link">
                        <div class="checklist-card">
                            <div class="image-placeholder">
                                <img src="../assets/img/talha-corrente.png" alt="talha-corrente">
                            </div>
                            <h4>
                                Eletromecânica Talha Elétrica de Corrente
                            </h4>
                        </div>
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/supabase.js"></script>
<script src="../assets/js/session.js"></script>
<script src="../assets/js/usuarios.js"></script>
</body>

</html>
