<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Definir Senha | WebCheck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <main>
        <div class="overlay">
            <div class="login-container">
                <div class="login-box">
                    <h1>WebCheck</h1>
                    <p class="subtitulo">
                        Defina a senha do seu acesso
                    </p>

                    <div id="mensagemSenha"
                         class="alert d-none"
                         role="alert"></div>

                    <form id="formDefinirSenha"
                          class="d-none"
                          onsubmit="definirSenha(event)">
                        <div class="mb-3">
                            <label for="novaSenha" class="form-label">
                                Nova senha
                            </label>
                            <input type="password"
                                   class="form-control"
                                   id="novaSenha"
                                   minlength="8"
                                   autocomplete="new-password"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label for="confirmarSenha" class="form-label">
                                Confirmar senha
                            </label>
                            <input type="password"
                                   class="form-control"
                                   id="confirmarSenha"
                                   minlength="8"
                                   autocomplete="new-password"
                                   required>
                        </div>

                        <button type="submit"
                                id="btnDefinirSenha"
                                class="btn btn-primary w-100">
                            Definir senha
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/definir-senha.js"></script>
</body>

</html>
