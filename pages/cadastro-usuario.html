<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Gerenciar Usuários | WebCheck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <div class="overlay">
        <header class="topbar">
            <div class="topbar-spacer"></div>

            <div class="logo-area">
                <h2>WebCheck</h2>
            </div>

            <div class="user-area user-profile dropdown">
                <button class="btn user-menu-toggle dropdown-toggle"
                        type="button"
                        id="menuUsuario"
                        data-bs-toggle="dropdown"
                        aria-expanded="false">
                    <span class="user-menu-label">
                        <span id="usuarioNome">Usuário</span>
                        <small id="usuarioTipo" class="user-role d-none"></small>
                    </span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end"
                    aria-labelledby="menuUsuario">
                    <li>
                        <a href="dashboard.html" class="dropdown-item">
                            Voltar ao dashboard
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <button type="button"
                                class="dropdown-item"
                                onclick="logout()">
                            Sair
                        </button>
                    </li>
                </ul>
            </div>
        </header>

        <main class="dashboard-container">
            <div class="dashboard-box usuarios-box">
                <h1>Gerenciar usuários</h1>
                <p class="subtitulo">
                    Cadastre e atualize os acessos ao sistema
                </p>

                <div id="mensagemCadastro" class="alert d-none" role="alert"></div>

                <section class="usuarios-section">
                    <h2>Novo usuário</h2>

                    <form id="formCadastroUsuario" onsubmit="cadastrarUsuario(event)">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="nome" class="form-label">Nome</label>
                                <input type="text"
                                       class="form-control"
                                       id="nome"
                                       required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="emailCadastro" class="form-label">Email</label>
                                <input type="email"
                                       class="form-control"
                                       id="emailCadastro"
                                       required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="celular" class="form-label">Celular</label>
                                <input type="tel"
                                       class="form-control"
                                       id="celular"
                                       placeholder="(00) 00000-0000">
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="tipo" class="form-label">Tipo de acesso</label>
                                <select id="tipo"
                                        class="form-select"
                                        required>
                                    <option value="user">Usuário</option>
                                    <option value="admin">Administrador</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end mt-4">
                            <button type="submit"
                                    id="btnCadastrarUsuario"
                                    class="btn btn-primary">
                                Cadastrar usuário
                            </button>
                        </div>
                    </form>
                </section>

                <section class="usuarios-section usuarios-lista-section">
                    <h2>Usuários cadastrados</h2>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Email</th>
                                    <th>Celular</th>
                                    <th>Acesso</th>
                                    <th class="text-end">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="listaUsuarios">
                                <tr>
                                    <td colspan="5" class="text-center text-secondary">
                                        Carregando...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5">Editar usuário</h2>
                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Fechar"></button>
                </div>

                <form id="formEditarUsuario" onsubmit="salvarUsuario(event)">
                    <div class="modal-body">
                        <input type="hidden" id="editarId">

                        <div class="mb-3">
                            <label for="editarNome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="editarNome" required>
                        </div>

                        <div class="mb-3">
                            <label for="editarEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="editarEmail" required>
                        </div>

                        <div class="mb-3">
                            <label for="editarCelular" class="form-label">Celular</label>
                            <input type="tel" class="form-control" id="editarCelular">
                        </div>

                        <div>
                            <label for="editarTipo" class="form-label">Tipo de acesso</label>
                            <select id="editarTipo" class="form-select" required>
                                <option value="user">Usuário</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button"
                                class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit"
                                id="btnSalvarUsuario"
                                class="btn btn-primary">
                            Salvar alterações
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/session.js"></script>
    <script src="../assets/js/usuarios.js"></script>
    <script src="../assets/js/cadastro-usuario.js"></script>
</body>

</html>
